<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Wind Turbine Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="main-wrapper">
        <header>
            <h1>Облік турбін вітрових електростанцій</h1>
        </header>
        
        <main>
            <section class="form-section">
                <h2>➕ Реєстрація турбін</h2>
                <form id="turbineForm">
                    <div class="form-group">
                        <label>Назва об'єкта</label>
                        <input type="text" name="name" required placeholder="Напр: Південна">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Тип системи</label>
                            <select name="type">
                                <option value="horizontal">Горизонтальна</option>
                                <option value="vertical">Вертикальна</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Координати (lat, lng)</label>
                            <input type="text" name="coords" required placeholder="46.48, 30.72">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Потужність (МВт)</label>
                            <input type="number" name="power" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Кількість (шт)</label>
                            <input type="number" name="count" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Висота щогли (м)</label>
                            <input type="number" name="height" step="0.1">
                        </div>
                        <div class="form-group">
                            <label>Діаметр ротора (м)</label>
                            <input type="number" name="diameter" step="0.1">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Зберегти в реєстр</button>
                </form>
                <div id="message" class="message"></div>
            </section>

            <section class="data-section">
                <h2>📊 Активні установки</h2>
                <div id="turbinesList" class="consumers-list"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
